<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimientos · FinancialMcp</title>
    <style>
        /* ── Design tokens (mismos valores que accounts.html/imports.html) ── */
        :root {
            --bg: #0f1117;
            --surface: #161b25;
            --surface2: #1e2535;
            --border: #2a3347;
            --text: #e2e8f4;
            --dim: #8b98b0;
            --faint: #4a5568;
            --green: #4ade80;
            --green-bg: #052e16;
            --red: #f87171;
            --red-bg: #2d0a0a;
            --amber: #fbbf24;
            --amber-bg: #2d1f07;
            --sans: -apple-system, system-ui, 'Segoe UI', sans-serif;
            --mono: 'SF Mono', 'Cascadia Code', Consolas, monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

        body {
            background: var(--bg);
            color: var(--text);
            font: 14px/1.6 var(--sans);
            min-height: 100vh;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

            .topbar h1 { font-size: 16px; font-weight: 700 }
            .topbar a {
                color: var(--dim);
                text-decoration: none;
                font-size: 13px;
            }
                .topbar a:hover { color: var(--text) }

        .content { padding: 20px 24px; max-width: 1200px; margin: 0 auto }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

            .panel-head h2 { font-size: 13px; font-weight: 600; color: var(--dim); text-transform: uppercase; letter-spacing: .05em }

        .filter-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

            .filter-bar .field {
                display: flex;
                align-items: center;
                gap: 6px;
            }
                .filter-bar .field label {
                    font-size: 11px;
                    color: var(--faint);
                    text-transform: uppercase;
                    letter-spacing: .05em;
                    white-space: nowrap;
                }

            .filter-bar input[type=text],
            .filter-bar input[type=date],
            .filter-bar select {
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: 4px;
                color: var(--text);
                padding: 6px 10px;
                font: 13px var(--sans);
            }
                .filter-bar input[type=text] { width: 220px }
                .filter-bar input[type=date] { font-family: var(--mono); font-size: 12px }
                .filter-bar input[type=text]:focus,
                .filter-bar input[type=date]:focus,
                .filter-bar select:focus { outline: 2px solid var(--green); outline-offset: 1px }

            .filter-bar .spacer { flex: 1 }

        /* PR-L2: barra contextual de clasificación en lote — aparece solo cuando
           hay selección, para una sola lista (sin dos lados, sin balance). */
        /* PR-P2: mismo patrón de barra que .filter-bar/.batch-bar (padding,
           border-bottom, flex-wrap) — badges con los tokens ya existentes de
           .status-badge, sin ningún color nuevo. */
        .summary-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        /* Mismos tokens --amber/--amber-bg que ya usa .status-badge.status-reviewed
           y .warning-badge — "incompleto" no es un error (por eso no --red),
           es la misma familia visual que el resto de la pantalla ya usa para
           "necesita atención". */
        .coverage-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--amber-bg);
            color: #f5dcb0;
            font-size: 12px;
        }

        .quick-filters {
            display: flex;
            gap: 6px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
        }

        .batch-bar {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }
            .batch-bar.visible { display: flex }
            .batch-bar .info { font-size: 12px; color: var(--dim) }

        .cb-cell { width: 32px }

        .progress-line { font: 11px var(--mono); color: var(--faint) }

        button {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            padding: 5px 12px;
            font: 13px var(--sans);
            cursor: pointer;
        }
            button:hover:not(:disabled) { background: #2a3348; border-color: #3a4560 }
            button:disabled { opacity: .35; cursor: not-allowed }
            button.sm { padding: 3px 8px; font-size: 12px }
            button.primary { background: var(--green-bg); border-color: var(--green); color: #c0f0d0 }
                button.primary:hover:not(:disabled) { background: #0a4020 }

        table { width: 100%; border-collapse: collapse }

        th {
            position: sticky;
            top: 0;
            background: var(--surface);
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .04em;
            color: var(--faint);
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 9px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            white-space: nowrap;
        }

        td.mono { font-family: var(--mono); font-size: 12px }

        /* PR-S5: la celda Descripción pasa a poder tener dos líneas (texto +
           sugerencias, ver .suggestion-chips) — el texto en sí sigue truncando en
           una sola línea con elipsis, ahora en un div interno en vez del propio td
           (por eso .truncate ya no está calificado a "td."). desc-cell anula el
           white-space: nowrap general de td para permitir que ambos hijos se
           apilen en vertical. */
        td.desc-cell { white-space: normal }

        .truncate {
            max-width: 320px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* PR-S5: sugerencias de clasificación (IClassificationSuggestionService) —
           información de solo lectura asociada al movimiento, nunca a la acción de
           clasificar (por eso vive junto a la descripción, no en .act-cell). Verde
           en vez de rojo (.warning-badge) para distinguir "sugerencia" de "alerta".
           flex-wrap porque puede haber más de una (hoy hasta 4, una por dimensión;
           preparado para que un motor futuro proponga más sin rediseñar esto). El
           texto visible ya es la información relevante (dimensión + valor) — title
           es un complemento con el motivo, no el mecanismo principal. */
        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
            max-width: 320px;
        }

        /* PR-U3: el estilo base sigue siendo el tratamiento de SuggestionConfidence.High
           (verde) tal cual estaba — no cambia. .confidence-medium/.confidence-low son
           los mismos 3 tokens que ya usa .status-badge.status-reviewed/status-pending
           para esos mismos niveles (ámbar/neutro), sin ningún valor hex o RGB nuevo —
           mismo criterio de reutilización que ya sigue .status-badge consigo mismo
           (border-color sobre el border: 1px solid var(--green) de acá abajo). */
        .suggestion-chip {
            display: inline-block;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 4px;
            border: 1px solid var(--green);
            color: #b0eec8;
            background: var(--green-bg);
        }
            .suggestion-chip.confidence-medium { color: #f5dcb0; background: var(--amber-bg); border-color: var(--amber) }
            .suggestion-chip.confidence-low { color: var(--dim); background: var(--surface2); border-color: var(--border) }

        /* PR-U2: clasificación ya confirmada de un movimiento, en el mismo slot que
           las sugerencias (.suggestion-chips, reutilizado tal cual como contenedor —
           es puro layout, sin color propio) — nunca conviven con sugerencias en la
           misma fila (m.suggestions siempre vacío para un movimiento clasificado,
           ver backend). Paleta neutra (mismos tokens que .status-badge.status-pending,
           sin ningún color nuevo) más el prefijo "✓" en el texto (mismo criterio que
           ya usa .warning-badge con "⚠") para que "esto ya se clasificó" se lea
           distinto de "esto es una sugerencia" sin depender solo del color. */
        .classification-chip {
            display: inline-block;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 4px;
            border: 1px solid var(--border);
            color: var(--dim);
            background: var(--surface2);
        }

        .empty, .loading {
            padding: 32px;
            text-align: center;
            color: var(--faint);
            font-size: 13px;
            white-space: normal;
        }

        .status-badge {
            display: inline-block;
            font-size: 11px;
            font-family: var(--mono);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }
            .status-badge.status-pending { color: var(--dim); background: var(--surface2); border-color: var(--border) }
            .status-badge.status-reviewed { color: #f5dcb0; background: var(--amber-bg); border-color: var(--amber) }
            .status-badge.status-confirmed { color: #b0eec8; background: var(--green-bg); border-color: var(--green) }

        /* PR-P1: cuenta financiera pasa a ser de solo lectura en esta pantalla —
           ya no es una decisión de clasificación, es un dato del movimiento
           importado (ver renderAccountCell). Mismo tratamiento visual que
           .status-reviewed (ámbar, ya existente) para señalar, sin agregar
           ningún color nuevo, que a ese movimiento le falta un dato que
           debería haber llegado resuelto desde la importación. */
        .status-badge.status-account-missing { color: #f5dcb0; background: var(--amber-bg); border-color: var(--amber) }

        /* Columna "Alerta" (K6): grupo sospechoso detectado por ISuspicionDetector
           (posible duplicado / posible split) — solo informativo, sin acción
           propia en esta pantalla. */
        .warning-badge {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--red);
            color: #f0b0b0;
            background: var(--red-bg);
            max-width: 240px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            vertical-align: middle;
        }

        .act-cell { display: flex; gap: 6px }

        /* ── Toast ── */
        .toast {
            font: 12px var(--mono);
            padding: 6px 12px;
            border-radius: 4px;
            display: inline-block;
        }
            .toast.ok { background: var(--green-bg); color: #b0eec8; border: 1px solid var(--green) }
            .toast.err { background: var(--red-bg); color: #f0b0b0; border: 1px solid var(--red) }

        /* ── Modal de clasificación ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 24px;
        }
            .modal-overlay.open { display: flex }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 460px;
            max-width: 100%;
            max-height: 88vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 40px rgba(0,0,0,.5);
        }

        .modal-head {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }
            .modal-head h2 { font-size: 14px; font-weight: 600 }
            .modal-head p { font-size: 12px; color: var(--faint); margin-top: 4px }

        .modal-body { padding: 16px 18px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px }

        .modal-field label {
            display: block;
            font-size: 11px;
            color: var(--faint);
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: 6px;
        }
            .modal-field label.req::after { content: ' *'; color: var(--red) }

        .modal-field select, .modal-field textarea, .modal-field input[type=text] {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            padding: 8px 10px;
            font: 13px var(--sans);
        }
            .modal-field select:focus, .modal-field textarea:focus, .modal-field input[type=text]:focus {
                outline: 2px solid var(--green);
                outline-offset: 1px;
            }

        .modal-field textarea { resize: vertical; min-height: 56px }

        /* PR-U4: listado de movimientos seleccionados dentro del modal en modo
           lote (state.modalMode === 'batch') — recuperado de
           group-reconciliation.html (retirada en PR-L4): mismo patrón de scroll
           propio y acotado (max-height + overflow-y en el propio contenedor, no
           en .modal-body), para no empujar el formulario fuera de vista con
           selecciones grandes. Tokens ya existentes (--dim/--surface2/--border),
           sin ningún color nuevo. Puramente informativo, sin ninguna acción
           propia dentro. */
        .batch-list {
            max-height: 90px;
            overflow-y: auto;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 8px 10px;
        }

        .batch-list-item {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 12px;
            color: var(--dim);
            line-height: 1.7;
        }
            /* Mismo mecanismo de truncamiento que .truncate ya usa en la tabla
               principal (overflow/text-overflow/white-space heredados de acá
               abajo) — solo se acota el ancho al espacio disponible dentro del
               modal (460px), más angosto que la celda Descripción de la tabla. */
            .batch-list-item .truncate { max-width: 200px }

        .modal-foot {
            padding: 12px 18px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .close-x {
            background: transparent;
            border: none;
            color: var(--faint);
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            padding: 2px 6px;
        }
            .close-x:hover { color: var(--text) }
    </style>
</head>
<body>

    <header class="topbar">
        <h1>Movimientos</h1>
        <a href="/dashboard.html">← Dashboard</a>
    </header>

    <div class="content">
        <div class="panel">
            <div class="panel-head">
                <h2>Movimientos <span id="countLabel" style="text-transform:none;color:var(--faint)"></span></h2>
            </div>
            <!-- PR-P2: totales del período completo (nunca del filtro rápido
                 activo, ver renderSummary) — para que el usuario sepa cuánto
                 trabajo le falta y si el Dashboard representa el mes completo,
                 sin recalcular nada nuevo: mismos datos que ya trae state.movements. -->
            <div class="summary-bar" id="summaryBar">
                <span class="status-badge" id="summaryTotal">— movimientos</span>
                <span class="status-badge status-confirmed" id="summaryClassified">— clasificados</span>
                <span class="status-badge status-reviewed" id="summaryPending">— pendientes</span>
                <span class="status-badge" id="summaryPct">—% completado</span>
            </div>
            <div class="coverage-bar" id="coverageBar" style="display:none">
                <strong>Dashboard incompleto.</strong> Hay movimientos sin clasificar.
            </div>
            <div class="filter-bar">
                <div class="field"><label for="fFrom">Desde</label><input type="date" id="fFrom"></div>
                <div class="field"><label for="fTo">Hasta</label><input type="date" id="fTo"></div>
                <input type="text" id="searchInput" placeholder="Buscar por descripción…">
                <select id="accountFilter"><option value="">Todas las cuentas</option></select>
                <button class="sm" id="btnApplyFilters">Aplicar</button>
                <div class="spacer"></div>
                <div id="listToast"></div>
            </div>
            <!-- PR-P2: filtro rápido sobre state.movements ya cargado — sin
                 pedir nada nuevo al backend. 'primary' marca el filtro activo,
                 alternado por updateViewFilterButtons(); reutiliza la misma
                 clase que ya usa cualquier botón primario del archivo, sin
                 agregar un estado visual nuevo. -->
            <div class="quick-filters" id="quickFilters">
                <button class="sm primary" data-filter="all">Todos</button>
                <button class="sm" data-filter="pending">Pendientes</button>
                <button class="sm" data-filter="classified">Clasificados</button>
            </div>
            <!-- PR-L2: solo aparece con selección activa. Una sola lista, una sola
                 acción. -->
            <div class="batch-bar" id="batchBar">
                <span class="info" id="batchCount"></span>
                <button class="sm primary" id="btnBatchClassify">Clasificar seleccionados</button>
                <button class="sm" id="btnBatchClear">Cancelar selección</button>
            </div>
            <div style="overflow-x:auto">
                <table>
                    <thead>
                        <tr>
                            <th class="cb-cell"><input type="checkbox" id="selectAllCheckbox" aria-label="Seleccionar todos los pendientes"></th>
                            <th>Fecha</th>
                            <th>Descripción</th>
                            <th>Importe</th>
                            <th>Estado</th>
                            <th>Cuenta financiera</th>
                            <th>Alerta</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="movementsBody"><tr><td colspan="8" class="loading">Cargando…</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ── Modal: clasificar movimiento (individual o en lote, PR-L2) ──
         Un mismo modal para ClassifyMovementCommand — state.modalMode ('classify' o
         'batch') decide si btnClassifySave dispara una sola llamada o un loop
         secuencial (ver saveBatchClassify). -->
    <div class="modal-overlay" id="classifyOverlay">
        <div class="modal">
            <div class="modal-head">
                <div>
                    <h2 id="classifyModalTitle">Clasificar movimiento</h2>
                    <p id="classifySubtitle"></p>
                </div>
                <button class="close-x" id="btnCloseClassify" aria-label="Cerrar">✕</button>
            </div>
            <div class="modal-body">
                <!-- PR-U4: solo visible en modo lote (ver openBatchModal/openClassifyModal) -->
                <div id="batchListWrap" style="display:none">
                    <div class="modal-field">
                        <label>Movimientos seleccionados</label>
                        <div class="batch-list" id="batchList"></div>
                    </div>
                </div>
                <div class="modal-field">
                    <label for="cCategory" class="req">Categoría</label>
                    <select id="cCategory"><option value="">Cargando…</option></select>
                </div>
                <div class="modal-field">
                    <label for="cImpact" class="req">Impacto financiero</label>
                    <select id="cImpact">
                        <option value="Expense">Gasto real</option>
                        <option value="InternalMovement">Transferencia interna</option>
                        <option value="DebtPayment">Pago de deuda</option>
                        <option value="Income">Ingreso</option>
                    </select>
                </div>
                <div class="modal-field">
                    <label for="cMovementType" class="req">Tipo de movimiento</label>
                    <select id="cMovementType">
                        <option value="Purchase">Compra</option>
                        <option value="Transfer">Transferencia</option>
                        <option value="Payment">Pago de deuda o factura</option>
                        <option value="Receipt">Cobro</option>
                        <option value="Fee">Comisión</option>
                        <option value="Interest">Interés</option>
                        <option value="Refund">Reintegro / devolución</option>
                        <option value="Adjustment">Ajuste contable</option>
                        <option value="Other">Otro</option>
                    </select>
                </div>
                <div class="modal-field">
                    <label for="cCounterparty">Contraparte (opcional)</label>
                    <div style="display:flex; gap:6px">
                        <select id="cCounterparty" style="flex:1"><option value="">— Sin contraparte —</option></select>
                        <button type="button" class="sm" id="btnNewCounterparty">+ Nueva</button>
                    </div>
                </div>
                <div class="modal-field">
                    <label for="cComment">Comentario (opcional)</label>
                    <textarea id="cComment" placeholder="Detalle adicional…"></textarea>
                </div>
                <!-- PR-L2: solo visible durante saveBatchClassify. -->
                <div id="classifyProgress" class="progress-line" style="display:none"></div>
                <div id="classifyToast"></div>
            </div>
            <div class="modal-foot">
                <button id="btnClassifyCancel">Cancelar</button>
                <button class="primary" id="btnClassifySave">Guardar clasificación</button>
            </div>
        </div>
    </div>

    <!-- ── Modal secundario: alta rápida de Contraparte (PR-P1) ──
         Se abre desde "+ Nueva" junto al select de Contraparte del modal de
         clasificación, sin salir de esta pantalla ni de ese modal. Único campo:
         Nombre — el backend (POST /api/counterparties) ya no exige Type desde
         PR-O7, así que no hace falta pedirlo acá tampoco. Al crear: se refresca
         el combo de Contraparte, se selecciona la nueva automáticamente, y la
         clasificación en curso sigue exactamente donde estaba. -->
    <div class="modal-overlay" id="counterpartyOverlay" style="z-index:60">
        <div class="modal" style="width:360px">
            <div class="modal-head">
                <h2>Nueva contraparte</h2>
                <button class="close-x" id="btnCloseCounterparty" aria-label="Cerrar">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-field">
                    <label for="cpName" class="req">Nombre</label>
                    <input type="text" id="cpName" placeholder="Ej: Farmacia Amancay">
                </div>
                <div id="counterpartyToast"></div>
            </div>
            <div class="modal-foot">
                <button id="btnCounterpartyCancel">Cancelar</button>
                <button class="primary" id="btnCounterpartyCreate">Crear</button>
            </div>
        </div>
    </div>

    <script>
        const API = '';

        // ── Estado ───────────────────────────────────────────────────────────────
        // Nombrado en términos generales (no "pendingMovements") a propósito: desde
        // K3, GET /api/movements devuelve pendientes y clasificados. El modelo siguió
        // creciendo en K6 (grupos sospechosos) y PR-S5 (sugerencias de clasificación)
        // sin rediseñarse.
        // modalMode distingue qué dispara btnClassifySave: 'classify' (default) o
        // 'batch' (PR-L2) — mismo modal, mismos campos, siempre ClassifyMovementCommand.
        // 'batch' no es un comando nuevo: es el mismo ClassifyMovementCommand disparado
        // N veces secuencialmente, un id de selectedIds por vez.
        //
        // PR-L4: hasta acá modalMode también tenía 'confirm' (ConfirmMatchCommand, K5) —
        // se retiró junto con todo el backend de matching legacy.
        const state = {
            movements: [],
            movementFilters: { from: null, to: null, financialAccountId: null, search: null },
            // PR-P2: filtro rápido de la grilla ('all'/'pending'/'classified') —
            // vive aparte de movementFilters porque no viaja al backend, solo
            // decide qué subconjunto de state.movements ya cargado se renderiza
            // (ver filterMovements/renderMovements).
            viewFilter: 'all',
            accounts: [],
            categories: [],
            counterparties: [],
            selectedMovement: null,
            selectedIds: new Set(),
            modalMode: 'classify',
        };

        // FinancialMovement.Source -> SourceEntityType / segmento de ruta REST.
        // Esta pantalla lista solo banco/tarjeta — GET /api/movements ya excluye
        // legacy, ver K1.
        const SOURCE_TO_ENTITY_TYPE = { BankDebit: 'BankStatement', CreditCard: 'Transaction' };

        const STATUS_LABELS = { Pending: 'Pendiente', Reviewed: 'Revisado', Confirmed: 'Confirmado' };
        const STATUS_CLASSES = { Pending: 'status-pending', Reviewed: 'status-reviewed', Confirmed: 'status-confirmed' };

        // K6: motivo por el que ISuspicionDetector marcó el grupo (SuspicionReason).
        const SUSPICION_LABELS = {
            PossibleDuplicate: 'Posible duplicado',
            SplitTransaction: 'Posible división',
            RoundingAnomaly: 'Anomalía de redondeo',
        };

        // PR-S5: nombre visible de cada SuggestionDimension (ClassificationSuggestion).
        // Mismo vocabulario que ya usan las labels del modal ("Categoría", "Tipo de
        // movimiento", "Contraparte") para que una sugerencia y su campo se lean como
        // la misma cosa. A diferencia de STATUS_LABELS/SUSPICION_LABELS, el *valor*
        // sugerido no necesita un mapa nuevo: Category/Counterparty ya resuelven
        // contra state.categories/state.counterparties, y MovementType/FinancialImpact
        // ya tienen su traducción en las <option> de #cMovementType/#cImpact (ver
        // suggestionValueLabel) — reutilizarlas evita mantener la misma traducción
        // dos veces.
        const SUGGESTION_DIMENSION_LABELS = {
            Category: 'Categoría',
            MovementType: 'Tipo',
            FinancialImpact: 'Impacto',
            Counterparty: 'Contraparte',
        };

        // PR-S5.1: orden fijo de presentación de sugerencias, independiente del
        // orden en que llegan desde el backend (ClassificationSuggestionSet.Suggestions
        // no garantiza ningún orden — hoy es estable por accidente de implementación
        // de ClassificationSuggestionService, no por contrato). Coincide a propósito
        // con el orden real de los campos del modal de clasificación (Categoría →
        // Impacto financiero → Tipo de movimiento → Contraparte, ver #cCategory/
        // #cImpact/#cMovementType/#cCounterparty más abajo en el HTML) para que leer
        // los chips y completar el modal se sientan la misma secuencia.
        const SUGGESTION_DIMENSION_ORDER = ['Category', 'FinancialImpact', 'MovementType', 'Counterparty'];

        // Ranking ordinal de SuggestionConfidence para poder compararlas — mismo
        // criterio que ya es ordinal en el propio backend (ver PR-S1/PR-S2:
        // deliberadamente Low/Medium/High, no un score continuo).
        const SUGGESTION_CONFIDENCE_RANK = { Low: 1, Medium: 2, High: 3 };

        // PR-U3: texto explícito del nivel, antepuesto al title existente en
        // renderSuggestionChips — para que la confianza no dependa solo del color
        // (.confidence-medium/.confidence-low, ver CSS de .suggestion-chip).
        // Constante separada de SUGGESTION_CONFIDENCE_RANK a propósito: ese mapa es
        // para orden/deduplicación (normalizeSuggestions), no para presentación —
        // sirven a propósitos distintos, no corresponde fusionarlos.
        const SUGGESTION_CONFIDENCE_LABELS = { Low: 'Baja confianza', Medium: 'Media confianza', High: 'Alta confianza' };

        // PR-U3: 'Low'/'Medium'/'High' -> clase modificadora de .suggestion-chip.
        // '' para High porque el estilo base de .suggestion-chip ya es ese
        // tratamiento (verde), sin cambios.
        function confidenceChipClass(confidence) {
            switch (confidence) {
                case 'Medium': return 'confidence-medium';
                case 'Low': return 'confidence-low';
                default: return '';
            }
        }

        // PR-S5.1: normaliza la lista de sugerencias de un movimiento antes de
        // guardarla en el view model — un único punto de verdad que usan tanto
        // renderSuggestionChips como suggestionValue (openClassifyModal), para que
        // chips y precarga nunca diverjan entre sí.
        //
        // Dedup: el contrato (ClassificationSuggestionSet) documenta "a lo sumo una
        // por dimensión" pero no lo garantiza el tipo — nada impide que una futura
        // implementación (reglas, IA) emita más de una para la misma dimensión. Ante
        // eso, se conserva la de mayor confianza; en empate, la primera recibida (el
        // `if` de abajo solo reemplaza con un ">" estricto, nunca con "=>").
        //
        // Orden: se recorre SUGGESTION_DIMENSION_ORDER para fijar la secuencia visual;
        // cualquier dimensión futura no contemplada ahí no se pierde — se agrega al
        // final en el orden en que llegó, mismo criterio defensivo que ya usan
        // SUGGESTION_DIMENSION_LABELS/suggestionValueLabel con su fallback al valor
        // crudo.
        function normalizeSuggestions(suggestions) {
            const byDimension = new Map();
            for (const s of suggestions) {
                const existing = byDimension.get(s.dimension);
                if (!existing || SUGGESTION_CONFIDENCE_RANK[s.confidence] > SUGGESTION_CONFIDENCE_RANK[existing.confidence]) {
                    byDimension.set(s.dimension, s);
                }
            }

            const ordered = SUGGESTION_DIMENSION_ORDER
                .filter(dim => byDimension.has(dim))
                .map(dim => byDimension.get(dim));

            const known = new Set(SUGGESTION_DIMENSION_ORDER);
            for (const [dim, s] of byDimension) {
                if (!known.has(dim)) ordered.push(s);
            }

            return ordered;
        }

        const fmt = n => new Intl.NumberFormat('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
        const fmtDate = iso => { const d = new Date(iso); return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getFullYear()).slice(2)}`; };

        // ── View model — desacoplado de MovementListItemDto ────────────────────────

        function toMovementViewModel(dto) {
            return {
                sourceId: dto.sourceId,
                date: dto.date,
                description: dto.description,
                amount: dto.amount,
                currency: dto.currency,
                source: dto.source,
                financialAccountId: dto.financialAccountId ?? null,
                status: dto.status,
                categoryId: dto.categoryId ?? null,
                counterpartyId: dto.counterpartyId ?? null,
                movementType: dto.movementType ?? null,
                financialImpact: dto.financialImpact ?? null,
                warning: dto.warning ? {
                    reason: dto.warning.reason,
                    description: dto.warning.description,
                    groupSize: dto.warning.groupSize,
                } : null,
                // PR-S5: dto.suggestions siempre es un array (nunca null, ver
                // MovementListItemDto) — ?? [] es solo defensivo.
                // PR-S5.1: normalizeSuggestions aplica el orden fijo y la
                // deduplicación por dimensión acá, una sola vez — tanto los chips
                // como la precarga del modal leen directamente de este resultado.
                suggestions: normalizeSuggestions((dto.suggestions ?? []).map(s => ({
                    dimension: s.dimension,
                    value: s.value,
                    confidence: s.confidence,
                    reason: s.reason,
                }))),
            };
        }

        // ── Init: período por defecto = mes actual (mismo default que el propio
        // endpoint aplica del lado servidor cuando se omiten from/to) ─────────────
        (function initPeriod() {
            const now = new Date(), y = now.getFullYear(), m = now.getMonth();
            const from = `${y}-${String(m + 1).padStart(2, '0')}-01`;
            const lastDay = new Date(y, m + 1, 0).getDate();
            const to = `${y}-${String(m + 1).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;
            document.getElementById('fFrom').value = from;
            document.getElementById('fTo').value = to;
            state.movementFilters.from = from;
            state.movementFilters.to = to;
        })();

        (async function loadAccounts() {
            try {
                state.accounts = await getJson(`${API}/api/accounts?includeDeactivated=true`);
                populateAccountFilter();
            } catch (e) {
                // El filtro de cuenta queda vacío hasta el próximo intento.
            }
        })();

        function populateAccountFilter() {
            const sel = document.getElementById('accountFilter');
            const opts = state.accounts
                .slice()
                .sort((a, b) => a.name.localeCompare(b.name))
                .map(a => `<option value="${a.id}">${esc(a.name)}${a.isDeactivated ? ' (desactivada)' : ''}</option>`)
                .join('');
            sel.innerHTML = '<option value="">Todas las cuentas</option>' + opts;
        }

        (async function loadCategories() {
            try {
                state.categories = await getJson(`${API}/api/categories`);
                document.getElementById('cCategory').innerHTML =
                    state.categories.map(c => `<option value="${c.id}">${esc(c.displayName)}</option>`).join('');
            } catch (e) {
                document.getElementById('cCategory').innerHTML = '<option value="">Error al cargar</option>';
            }
        })();

        (async function loadCounterparties() {
            try {
                state.counterparties = await getJson(`${API}/api/counterparties`);
                document.getElementById('cCounterparty').innerHTML =
                    '<option value="">— Sin contraparte —</option>' +
                    state.counterparties.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
            } catch (e) {
                document.getElementById('cCounterparty').innerHTML = '<option value="">— Sin contraparte —</option>';
            }
        })();

        // ── Listado: GET /api/movements ─────────────────────────────────────────────

        async function loadMovements() {
            const tbody = document.getElementById('movementsBody');
            tbody.innerHTML = '<tr><td colspan="8" class="loading">Cargando…</td></tr>';
            // Una recarga (filtros nuevos, o el propio período) puede dejar de incluir
            // movimientos hoy seleccionados — limpiar es más simple y correcto que
            // tratar de preservar selección contra una lista que va a cambiar.
            state.selectedIds.clear();
            updateBatchBar();

            const params = new URLSearchParams();
            if (state.movementFilters.from) params.set('from', state.movementFilters.from);
            if (state.movementFilters.to) params.set('to', state.movementFilters.to);
            if (state.movementFilters.financialAccountId) params.set('financialAccountId', state.movementFilters.financialAccountId);
            if (state.movementFilters.search) params.set('search', state.movementFilters.search);

            try {
                const data = await getJson(`${API}/api/movements?${params.toString()}`);
                state.movements = (data ?? []).map(toMovementViewModel);
                renderMovements();
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="8" class="empty">No se pudo cargar el listado: ${esc(e.message)}</td></tr>`;
            }
        }

        // ── Render ───────────────────────────────────────────────────────────────
        // Separado en piezas por columna (renderStatusCell/renderAccountCell/
        // renderWarningCell/renderActionsCell) a propósito: agregar grupos
        // sospechosos (K6) fue insertar una función de celda nueva, nunca reescribir
        // renderMovementRow. Futuras ampliaciones siguen el mismo patrón.
        // PR-S5 es la primera vez que una pieza nueva (renderSuggestionChips) se
        // agrega DENTRO de una celda existente (Descripción) en vez de ser su propia
        // columna — deliberado: una sugerencia es información sobre el movimiento
        // (comparte identidad con su descripción), no una acción — no pertenece a
        // .act-cell junto al botón de clasificar.

        // PR-P2: subconjunto de state.movements según el filtro rápido activo —
        // puramente client-side, sobre datos ya cargados, sin tocar
        // movementFilters (esos sí viajan a GET /api/movements).
        function filterMovements(filter) {
            switch (filter) {
                case 'pending': return state.movements.filter(m => m.status === 'Pending');
                case 'classified': return state.movements.filter(m => m.status !== 'Pending');
                default: return state.movements;
            }
        }

        function updateViewFilterButtons() {
            document.querySelectorAll('#quickFilters button[data-filter]').forEach(btn => {
                btn.classList.toggle('primary', btn.dataset.filter === state.viewFilter);
            });
        }

        // PR-P2: totales del período completo — siempre sobre state.movements
        // sin filtrar, nunca sobre el subconjunto del filtro rápido activo, para
        // que "cuánto me falta" y "¿confío en el Dashboard?" no dependan de qué
        // se esté mirando en ese momento. Mismo conteo que ya existe (m.status),
        // sin ningún cálculo nuevo.
        function renderSummary() {
            const total = state.movements.length;
            const pending = state.movements.filter(m => m.status === 'Pending').length;
            const classified = total - pending;
            const pct = total > 0 ? Math.round((classified / total) * 100) : 0;

            document.getElementById('summaryTotal').textContent = `${total} movimiento${total !== 1 ? 's' : ''}`;
            document.getElementById('summaryClassified').textContent = `${classified} clasificado${classified !== 1 ? 's' : ''}`;
            document.getElementById('summaryPending').textContent = `${pending} pendiente${pending !== 1 ? 's' : ''}`;
            document.getElementById('summaryPct').textContent = `${pct}% completado`;

            document.getElementById('coverageBar').style.display = pending > 0 ? 'flex' : 'none';
        }

        function renderMovements() {
            const tbody = document.getElementById('movementsBody');

            // PR-P2: si el filtro rápido activo se queda sin resultados pero
            // todavía hay movimientos en el período (ej: se estaba viendo
            // "Pendientes" y se acaba de clasificar el último), se vuelve a
            // "Todos" — nunca se deja una grilla vacía que parezca un error.
            if (state.movements.length > 0 && filterMovements(state.viewFilter).length === 0) {
                state.viewFilter = 'all';
            }
            updateViewFilterButtons();
            renderSummary();

            const visible = filterMovements(state.viewFilter);
            document.getElementById('countLabel').textContent =
                visible.length > 0 ? `(${visible.length})` : '';

            if (visible.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty">No hay movimientos para este período.</td></tr>';
                updateBatchBar();
                return;
            }

            tbody.innerHTML = visible.map(renderMovementRow).join('');
            updateBatchBar();
        }

        function renderMovementRow(m) {
            // PR-L2: solo pendientes son seleccionables — clasificar en lote no
            // cubre reclasificación, que ya tiene su propio flujo individual con
            // precarga de valores existentes (openClassifyModal).
            const checked = state.selectedIds.has(m.sourceId) ? ' checked' : '';
            const disabled = m.status !== 'Pending' ? ' disabled' : '';
            return `
                <tr data-source-id="${m.sourceId}">
                    <td class="cb-cell"><input type="checkbox" class="row-select" data-source-id="${m.sourceId}"${checked}${disabled}></td>
                    <td>${fmtDate(m.date)}</td>
                    <td class="desc-cell">
                        <div class="truncate" title="${esc(m.description)}">${esc(m.description)}</div>
                        ${renderSuggestionChips(m)}
                        ${renderClassificationChips(m)}
                    </td>
                    <td class="mono">$${fmt(m.amount)}</td>
                    <td>${renderStatusCell(m)}</td>
                    <td>${renderAccountCell(m)}</td>
                    <td>${renderWarningCell(m)}</td>
                    <td class="act-cell">${renderActionsCell(m)}</td>
                </tr>`;
        }

        function renderStatusCell(m) {
            const cls = STATUS_CLASSES[m.status] ?? 'status-pending';
            const label = STATUS_LABELS[m.status] ?? m.status;
            return `<span class="status-badge ${cls}">${esc(label)}</span>`;
        }

        // PR-P1: la cuenta financiera pasa a ser de solo lectura acá — es un dato
        // del movimiento importado, no una decisión de esta pantalla (ver
        // análisis de flujo de clasificación). "Sin cuenta detectada" es
        // deliberadamente distinto de un <select> vacío: no invita a elegir nada,
        // solo informa que ese dato debería haber llegado resuelto desde la
        // importación y todavía no lo está.
        function renderAccountCell(m) {
            if (!m.financialAccountId) {
                return '<span class="status-badge status-account-missing">Sin cuenta detectada</span>';
            }
            const acc = state.accounts.find(a => a.id === m.financialAccountId);
            const name = acc ? acc.name : 'Cuenta asignada';
            return `<span class="status-badge status-pending" title="${esc(name)}">${esc(name)}</span>`;
        }

        // K6: solo información — sin acción propia. Resolver el grupo (marcar como
        // no-duplicado, etc.) no tiene ninguna pantalla hoy.
        function renderWarningCell(m) {
            if (!m.warning) return '<span style="color: var(--dim)">—</span>';
            const w = m.warning;
            const label = SUSPICION_LABELS[w.reason] ?? w.reason;
            return `<span class="warning-badge" title="${esc(w.description)}">⚠ ${esc(label)}</span>`;
        }

        // PR-S5: solo información — sin acción propia. Nunca hay sugerencias en
        // movimientos ya clasificados (m.suggestions siempre vacío en ese caso, ver
        // backend) — no hace falta chequear m.status acá. El texto visible ya es
        // "Dimensión: valor"; title agrega el nivel de confianza y el motivo
        // (reason), como complemento, no como mecanismo principal de lectura.
        // PR-S5.1: m.suggestions ya llega ordenado y deduplicado por dimensión
        // (ver normalizeSuggestions en toMovementViewModel) — esta función solo
        // mapea a HTML, sin ordenar ni filtrar nada por su cuenta.
        // PR-U1: aplicar TODAS las sugerencias de una vez sin abrir el modal ya es
        // posible cuando las 4 dimensiones tienen confianza High — ver
        // quickAcceptValues/renderActionsCell. Para cualquier otro caso (parcial,
        // o con alguna confianza Medium/Low), sigue pasando por "Clasificar" como
        // siempre. Estos chips en sí siguen sin acción propia.
        // PR-U2: mismo slot visual (la celda Descripción) que renderClassificationChips
        // — nunca se muestran a la vez: un movimiento clasificado siempre trae
        // m.suggestions vacío (ver backend), así que esta función ya devuelve ''
        // apenas eso ocurre, sin necesidad de chequear m.status acá tampoco.
        // PR-U3: confidenceChipClass agrega la clase de color correspondiente al
        // nivel (SuggestionConfidence.High sigue siendo el estilo base, sin
        // cambios) y SUGGESTION_CONFIDENCE_LABELS antepone el nivel en texto al
        // title existente — mismo motivo (reason) de siempre, sin quitarlo, para
        // que la confianza no dependa solo del color. Sin texto ni ícono nuevo en
        // el contenido visible del chip.
        function renderSuggestionChips(m) {
            if (!m.suggestions || m.suggestions.length === 0) return '';
            const chips = m.suggestions.map(s => {
                const dimLabel = SUGGESTION_DIMENSION_LABELS[s.dimension] ?? s.dimension;
                const valueLabel = suggestionValueLabel(s);
                const chipClass = confidenceChipClass(s.confidence);
                const confidenceLabel = SUGGESTION_CONFIDENCE_LABELS[s.confidence] ?? s.confidence;
                const title = `${confidenceLabel}\n\n${s.reason}`;
                return `<span class="suggestion-chip${chipClass ? ' ' + chipClass : ''}" title="${esc(title)}">${esc(dimLabel)}: ${esc(valueLabel)}</span>`;
            }).join('');
            return `<div class="suggestion-chips">${chips}</div>`;
        }

        // PR-U2: extraído de lo que antes era el cuerpo de suggestionValueLabel,
        // para que renderClassificationChips resuelva el mismo tipo de etiqueta sin
        // duplicar las 4 ramas — Category/Counterparty resuelven contra los
        // catálogos ya cargados para el modal (state.categories/state.counterparties)
        // — si todavía no cargaron (loadCategories/loadCounterparties son
        // independientes de loadMovements, sin await entre ellas), se muestra el
        // valor crudo como resultado razonable: nunca rompe, se corrige solo en el
        // próximo render. MovementType/FinancialImpact no necesitan su propio mapa
        // de traducción: ya están traducidos en las <option> de #cMovementType/
        // #cImpact (ver optionLabel).
        function resolveDimensionLabel(dimension, value) {
            switch (dimension) {
                case 'Category': return state.categories.find(c => c.id === value)?.displayName ?? value;
                case 'Counterparty': return state.counterparties.find(c => c.id === value)?.name ?? value;
                case 'MovementType': return optionLabel('cMovementType', value);
                case 'FinancialImpact': return optionLabel('cImpact', value);
                default: return value;
            }
        }

        function suggestionValueLabel(s) {
            return resolveDimensionLabel(s.dimension, s.value);
        }

        function optionLabel(selectId, value) {
            const opt = document.querySelector(`#${selectId} option[value="${value}"]`);
            return opt ? opt.textContent : value;
        }

        // PR-U2: clasificación ya asignada, en el mismo slot que renderSuggestionChips
        // (ver su comentario) — solo para movimientos que ya salieron de Pending,
        // así que nunca compite con las sugerencias. DIMENSION_TO_MOVEMENT_FIELD +
        // SUGGESTION_DIMENSION_ORDER fijan el mismo orden que ya usan las
        // sugerencias y el modal (Categoría → Impacto → Tipo → Contraparte).
        // Counterparty se omite cuando es null — "sin contraparte" es un estado de
        // clasificación válido, no un chip vacío (mismo criterio que ya usa
        // BuildSuggestions en el backend para esta misma dimensión opcional). El
        // prefijo "✓" (mismo criterio que ya usa renderWarningCell con "⚠") marca
        // que esto es un valor confirmado, no una recomendación — para que se lea
        // distinto de un vistazo, no solo por el color de .classification-chip.
        const DIMENSION_TO_MOVEMENT_FIELD = {
            Category: 'categoryId',
            FinancialImpact: 'financialImpact',
            MovementType: 'movementType',
            Counterparty: 'counterpartyId',
        };

        function renderClassificationChips(m) {
            if (m.status === 'Pending') return '';

            const chips = SUGGESTION_DIMENSION_ORDER
                .map(dim => ({ dimension: dim, value: m[DIMENSION_TO_MOVEMENT_FIELD[dim]] }))
                .filter(c => c.value !== null && c.value !== undefined)
                .map(c => {
                    const dimLabel = SUGGESTION_DIMENSION_LABELS[c.dimension] ?? c.dimension;
                    const valueLabel = resolveDimensionLabel(c.dimension, c.value);
                    return `<span class="classification-chip">✓ ${esc(dimLabel)}: ${esc(valueLabel)}</span>`;
                })
                .join('');

            return `<div class="suggestion-chips">${chips}</div>`;
        }

        // PR-U1: "Aceptar sugerencia" solo cuando quickAcceptValues resuelve las 4
        // dimensiones (nunca para movimientos ya clasificados, porque esos siempre
        // llegan con m.suggestions vacío — ver backend). Convive con "Clasificar"/
        // "Cambiar categoría" en la misma .act-cell — es una acción, no información
        // (a diferencia de los chips de renderSuggestionChips, que sí son solo
        // informativos y viven en la celda Descripción).
        function renderActionsCell(m) {
            const label = m.status === 'Pending' ? 'Clasificar' : 'Cambiar categoría';
            const classifyBtn = `<button class="sm" data-action="classify" data-source-id="${m.sourceId}" data-source="${m.source}">${esc(label)}</button>`;

            const quickValues = quickAcceptValues(m);
            if (!quickValues) return classifyBtn;

            return classifyBtn +
                `<button class="sm primary" data-action="quick-accept" data-source-id="${m.sourceId}">Aceptar sugerencia</button>`;
        }

        // PR-U1: sugerencia lista para aceptar con un clic sin abrir el modal —
        // solo cuando existe una sugerencia para cada una de las 4 dimensiones
        // (mismas de SUGGESTION_DIMENSION_ORDER — no existe ninguna otra dimensión
        // hoy, ver SuggestionDimension en el backend) y las 4 son
        // SuggestionConfidence.High. Devuelve los 4 valores ya resueltos por
        // dimensión (mismo formato string que ya usan los <select> del modal), o
        // null si no aplica.
        function quickAcceptValues(m) {
            if (!m.suggestions || m.suggestions.length === 0) return null;

            const byDimension = {};
            for (const s of m.suggestions) {
                if (s.confidence !== 'High') return null;
                byDimension[s.dimension] = s.value;
            }

            for (const dim of SUGGESTION_DIMENSION_ORDER) {
                if (!(dim in byDimension)) return null;
            }

            return byDimension;
        }

        // ── Filtros ──────────────────────────────────────────────────────────────

        document.getElementById('btnApplyFilters').addEventListener('click', () => {
            state.movementFilters.from = document.getElementById('fFrom').value || null;
            state.movementFilters.to = document.getElementById('fTo').value || null;
            loadMovements();
        });

        document.getElementById('accountFilter').addEventListener('change', () => {
            state.movementFilters.financialAccountId = document.getElementById('accountFilter').value || null;
            loadMovements();
        });

        let searchDebounce = null;
        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(searchDebounce);
            searchDebounce = setTimeout(() => {
                state.movementFilters.search = document.getElementById('searchInput').value.trim() || null;
                loadMovements();
            }, 300);
        });

        // PR-P2: filtro rápido — solo cambia state.viewFilter y vuelve a
        // renderizar; no toca movementFilters ni dispara loadMovements (no hay
        // ningún dato nuevo que pedir al backend, ver filterMovements).
        document.getElementById('quickFilters').addEventListener('click', e => {
            const btn = e.target.closest('button[data-filter]');
            if (!btn) return;
            state.viewFilter = btn.dataset.filter;
            renderMovements();
        });

        // ── Selección de filas ───────────────────────────────────────────────────
        // PR-P1: la cuenta financiera dejó de asignarse desde acá (ver
        // renderAccountCell) — este listener ya solo cubre el checkbox de
        // selección para clasificación en lote.

        document.getElementById('movementsBody').addEventListener('change', e => {
            const cb = e.target.closest('.row-select');
            if (cb) toggleRowSelection(cb.dataset.sourceId, cb.checked);
        });

        // ── Selección en lote (PR-L2) ────────────────────────────────────────────
        // Una sola lista, un solo Set de seleccionados — no hay "lado A/lado B" ni
        // balance. Solo movimientos Pendientes son seleccionables (ver renderMovementRow).

        function toggleRowSelection(sourceId, checked) {
            checked ? state.selectedIds.add(sourceId) : state.selectedIds.delete(sourceId);
            updateBatchBar();
        }

        document.getElementById('selectAllCheckbox').addEventListener('change', e => {
            const boxes = [...document.querySelectorAll('#movementsBody .row-select:not(:disabled)')];
            boxes.forEach(cb => {
                cb.checked = e.target.checked;
                e.target.checked ? state.selectedIds.add(cb.dataset.sourceId) : state.selectedIds.delete(cb.dataset.sourceId);
            });
            updateBatchBar();
        });

        function updateBatchBar() {
            const n = state.selectedIds.size;
            const bar = document.getElementById('batchBar');
            bar.classList.toggle('visible', n > 0);
            document.getElementById('batchCount').textContent =
                n > 0 ? `${n} movimiento${n !== 1 ? 's' : ''} seleccionado${n !== 1 ? 's' : ''}` : '';

            const selectAll = document.getElementById('selectAllCheckbox');
            const boxes = [...document.querySelectorAll('#movementsBody .row-select:not(:disabled)')];
            selectAll.checked = boxes.length > 0 && boxes.every(cb => cb.checked);
            selectAll.indeterminate = !selectAll.checked && boxes.some(cb => cb.checked);
        }

        document.getElementById('btnBatchClear').addEventListener('click', () => {
            state.selectedIds.clear();
            renderMovements();
        });

        document.getElementById('btnBatchClassify').addEventListener('click', openBatchModal);

        // ── Clasificación individual ────────────────────────────────────────────

        document.getElementById('movementsBody').addEventListener('click', e => {
            const classifyBtn = e.target.closest('button[data-action="classify"]');
            if (classifyBtn) { openClassifyModal(classifyBtn.dataset.sourceId); return; }

            const quickAcceptBtn = e.target.closest('button[data-action="quick-accept"]');
            if (quickAcceptBtn) quickAcceptSuggestion(quickAcceptBtn.dataset.sourceId, quickAcceptBtn);
        });

        // PR-U1: mismo endpoint/comando que el modal (ver classifyMovement), sin
        // abrirlo — toma los 4 valores ya resueltos por quickAcceptValues en vez de
        // leerlos de los <select> del modal. Sin comentario (la clasificación rápida
        // no pasa por el campo de comentario libre, que es exclusivo del modal).
        async function quickAcceptSuggestion(sourceId, btn) {
            const movement = state.movements.find(m => m.sourceId === sourceId);
            if (!movement) return;

            const values = quickAcceptValues(movement);
            if (!values) return;

            btn.disabled = true;
            try {
                await classifyMovement(
                    movement, values.Category, values.MovementType, values.FinancialImpact, values.Counterparty, null);
                showToast('listToast', 'Clasificación guardada', 'ok');
            } catch (e) {
                showToast('listToast', e.message, 'err');
            } finally {
                btn.disabled = false;
            }
        }

        // PR-S5: busca, dentro de las sugerencias del movimiento, el valor para una
        // dimensión puntual. Devuelve undefined si no hay sugerencia para esa
        // dimensión — ?? en el llamador decide el fallback final.
        function suggestionValue(movement, dimension) {
            return movement.suggestions.find(s => s.dimension === dimension)?.value;
        }

        // PR-P1: inferencia liviana, exclusiva de esta pantalla, para preseleccionar
        // Impacto financiero cuando el movimiento todavía no tiene clasificación ni
        // sugerencia del backend — no toca ClassificationSuggestionService ni ningún
        // endpoint nuevo, solo lee texto y monto que ya están en pantalla. "PAGO DE
        // TARJETA.../CUENTA VISA-MASTERCARD NRO..." son los dos patrones reales
        // (verificados contra extractos BBVA reales) para pago de resumen de
        // tarjeta — siempre Pago de deuda, nunca Gasto real. Para todo lo demás, el
        // signo del importe alcanza: en este modelo (FinancialMovement.Amount)
        // positivo = gasto, negativo = ingreso, sin excepción — nunca ambiguo.
        function inferFinancialImpact(movement) {
            const desc = (movement.description || '').toUpperCase();
            if (desc.includes('PAGO DE TARJETA') || desc.includes('CUENTA VISA NRO') || desc.includes('CUENTA MASTERCARD NRO')) {
                return 'DebtPayment';
            }
            return movement.amount > 0 ? 'Expense' : 'Income';
        }

        function openClassifyModal(sourceId) {
            const movement = state.movements.find(m => m.sourceId === sourceId);
            if (!movement) return;
            state.selectedMovement = movement;
            state.modalMode = 'classify';

            document.getElementById('classifyModalTitle').textContent = 'Clasificar movimiento';
            document.getElementById('classifySubtitle').textContent =
                `${fmtDate(movement.date)} · ${movement.description} · $${fmt(movement.amount)}`;
            // Si ya está clasificado, precarga los valores actuales — "cambiar la
            // categoría" parte de lo que ya eligió el usuario, no de un formulario vacío.
            // PR-S5: si no hay valor actual (movimiento Pendiente), el segundo ??
            // prueba la sugerencia del motor antes de caer al default/vacío — nunca
            // reemplaza un valor real (el backend nunca da sugerencias a un
            // movimiento que ya tiene categoría, ver ClassificationSuggestionSet).
            // Es solo un valor de partida en un <select> común: el usuario lo ve
            // precargado y puede cambiarlo como cualquier otro, nunca se bloquea ni
            // se envía nada sin que el usuario confirme "Guardar clasificación".
            document.getElementById('cCategory').value = movement.categoryId ?? suggestionValue(movement, 'Category') ?? '';
            document.getElementById('cImpact').value = movement.financialImpact ?? suggestionValue(movement, 'FinancialImpact') ?? inferFinancialImpact(movement);
            document.getElementById('cMovementType').value = movement.movementType ?? suggestionValue(movement, 'MovementType') ?? 'Purchase';
            document.getElementById('cCounterparty').value = movement.counterpartyId ?? suggestionValue(movement, 'Counterparty') ?? '';
            document.getElementById('cComment').value = '';
            document.getElementById('btnClassifySave').textContent = 'Guardar clasificación';
            document.getElementById('classifyToast').innerHTML = '';
            // PR-U4: el modal es compartido con el modo lote (ver openBatchModal) —
            // se oculta acá para no dejar visible el listado de una apertura en
            // lote anterior.
            document.getElementById('batchListWrap').style.display = 'none';
            document.getElementById('classifyOverlay').classList.add('open');
        }

        // PR-L2: mismo modal, segundo modo. Sin precarga de categoría/tipo/contraparte
        // — a diferencia de reclasificar, todas las filas seleccionadas son
        // Pendientes (ver renderMovementRow), sin ninguna clasificación previa de
        // la que partir. Muestra el total como chequeo rápido antes de aplicar la
        // misma clasificación a todas.
        // PR-U4: además del total, lista el detalle (fecha/descripción/importe) de
        // cada movimiento seleccionado, para revisar exactamente qué se va a
        // clasificar antes de confirmar — reutiliza `selected`, ya calculado acá
        // mismo para `total`, sin recorrer state.movements una segunda vez ni
        // pedir ningún dato adicional al backend.
        function openBatchModal() {
            const n = state.selectedIds.size;
            if (n === 0) return;
            state.selectedMovement = null;
            state.modalMode = 'batch';

            const selected = state.movements.filter(m => state.selectedIds.has(m.sourceId));
            const total = selected.reduce((sum, m) => sum + m.amount, 0);
            document.getElementById('classifyModalTitle').textContent = `Clasificar ${n} movimiento${n !== 1 ? 's' : ''}`;
            document.getElementById('classifySubtitle').textContent =
                `Se aplicará la misma clasificación a los ${n} movimientos seleccionados · Total $${fmt(total)}`;
            document.getElementById('batchListWrap').style.display = 'block';
            document.getElementById('batchList').innerHTML = selected.map(m => `
                <div class="batch-list-item">
                    <span>${fmtDate(m.date)}</span>
                    <div class="truncate" title="${esc(m.description)}">${esc(m.description)}</div>
                    <span>$${fmt(m.amount)}</span>
                </div>`).join('');
            document.getElementById('cCategory').value = '';
            document.getElementById('cImpact').value = 'Expense';
            document.getElementById('cMovementType').value = 'Purchase';
            document.getElementById('cCounterparty').value = '';
            document.getElementById('cComment').value = '';
            document.getElementById('btnClassifySave').textContent = `Clasificar ${n} movimiento${n !== 1 ? 's' : ''}`;
            document.getElementById('classifyToast').innerHTML = '';
            document.getElementById('classifyOverlay').classList.add('open');
        }

        function closeClassifyModal() {
            document.getElementById('classifyOverlay').classList.remove('open');
            state.selectedMovement = null;
        }

        document.getElementById('btnCloseClassify').addEventListener('click', closeClassifyModal);
        document.getElementById('btnClassifyCancel').addEventListener('click', closeClassifyModal);
        document.getElementById('classifyOverlay').addEventListener('click', e => {
            if (e.target.id === 'classifyOverlay') closeClassifyModal();
        });

        // ── Alta rápida de Contraparte, sin salir de la clasificación (PR-P1) ────
        // Modal secundario e independiente de #classifyOverlay — al crear, solo
        // refresca el combo #cCounterparty y selecciona la nueva; el modal de
        // clasificación de atrás nunca se cierra ni pierde lo que el usuario ya
        // había elegido en los demás campos.

        document.getElementById('btnNewCounterparty').addEventListener('click', openCounterpartyModal);

        function openCounterpartyModal() {
            document.getElementById('cpName').value = '';
            document.getElementById('counterpartyToast').innerHTML = '';
            document.getElementById('counterpartyOverlay').classList.add('open');
            document.getElementById('cpName').focus();
        }

        function closeCounterpartyModal() {
            document.getElementById('counterpartyOverlay').classList.remove('open');
        }

        document.getElementById('btnCloseCounterparty').addEventListener('click', closeCounterpartyModal);
        document.getElementById('btnCounterpartyCancel').addEventListener('click', closeCounterpartyModal);
        document.getElementById('counterpartyOverlay').addEventListener('click', e => {
            if (e.target.id === 'counterpartyOverlay') closeCounterpartyModal();
        });

        document.getElementById('btnCounterpartyCreate').addEventListener('click', createCounterpartyInline);

        async function createCounterpartyInline() {
            const name = document.getElementById('cpName').value.trim();
            if (!name) {
                showToast('counterpartyToast', 'El nombre es requerido', 'err');
                return;
            }

            const btn = document.getElementById('btnCounterpartyCreate');
            btn.disabled = true;
            try {
                const created = await postJson(`${API}/api/counterparties`, { name });
                state.counterparties = await getJson(`${API}/api/counterparties`);
                document.getElementById('cCounterparty').innerHTML =
                    '<option value="">— Sin contraparte —</option>' +
                    state.counterparties.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
                document.getElementById('cCounterparty').value = created.id;
                closeCounterpartyModal();
                showToast('classifyToast', `Contraparte "${name}" creada`, 'ok');
            } catch (e) {
                showToast('counterpartyToast', e.message, 'err');
            } finally {
                btn.disabled = false;
            }
        }

        document.getElementById('btnClassifySave').addEventListener('click', saveClassification);

        // Un solo botón, dos flujos según state.modalMode — ver el comentario sobre
        // el modal más arriba. 'batch' no toma selectedMovement: opera sobre
        // selectedIds directamente dentro de saveBatchClassify.
        async function saveClassification() {
            const categoryId = document.getElementById('cCategory').value;
            if (!categoryId) {
                showToast('classifyToast', 'Seleccioná una categoría', 'err');
                return;
            }

            const btn = document.getElementById('btnClassifySave');
            btn.disabled = true;
            try {
                if (state.modalMode === 'batch') {
                    await saveBatchClassify(categoryId);
                    return;
                }

                const movement = state.selectedMovement;
                if (!movement) return;

                await saveClassify(movement, categoryId);
            } catch (e) {
                showToast('classifyToast', e.message, 'err');
            } finally {
                btn.disabled = false;
            }
        }

        async function saveClassify(movement, categoryId) {
            await classifyMovement(
                movement,
                categoryId,
                document.getElementById('cMovementType').value,
                document.getElementById('cImpact').value,
                document.getElementById('cCounterparty').value || null,
                document.getElementById('cComment').value.trim() || null);
            closeClassifyModal();
            showToast('listToast', 'Clasificación guardada', 'ok');
        }

        // PR-U1: extraído de saveClassify para que quickAcceptSuggestion (fila,
        // sin modal) ejecute exactamente el mismo POST/actualización de estado que
        // el modal, sin duplicar el cuerpo de la petición ni el manejo del
        // resultado — mismo endpoint, mismo ClassifyMovementCommand de siempre, sin
        // lógica de negocio propia acá (solo arma el DTO y refleja la respuesta en
        // el view model local, igual que ya hacía saveClassify).
        // GET /api/movements incluye pendientes y clasificados (K3): el
        // movimiento sigue en la lista, solo cambia su estado.
        async function classifyMovement(movement, categoryId, movementType, financialImpact, counterpartyId, comment) {
            const body = {
                sourceEntityType: SOURCE_TO_ENTITY_TYPE[movement.source],
                sourceId: movement.sourceId,
                categoryId,
                movementType,
                financialImpact,
                counterpartyId,
                comment,
            };

            await postJson(`${API}/api/movement-review/classify`, body);
            movement.status = 'Reviewed';
            movement.categoryId = body.categoryId;
            movement.counterpartyId = body.counterpartyId;
            movement.movementType = body.movementType;
            movement.financialImpact = body.financialImpact;
            // Un movimiento clasificado nunca trae sugerencias del backend (ver
            // MovementView.Suggestions) — se limpia también acá para que los chips
            // y el botón "Aceptar sugerencia" desaparezcan en el mismo render, sin
            // esperar a la próxima carga completa de la lista.
            movement.suggestions = [];
            renderMovements();
        }

        // PR-L2: mismo endpoint y mismo comando que saveClassify (ClassifyMovementCommand),
        // uno por movimiento, en loop secuencial. Sin comando ni endpoint batch nuevo.
        // Cada llamada es independiente: un fallo individual no aborta el resto del lote.
        async function saveBatchClassify(categoryId) {
            const ids = [...state.selectedIds];
            const shared = {
                categoryId,
                movementType: document.getElementById('cMovementType').value,
                financialImpact: document.getElementById('cImpact').value,
                counterpartyId: document.getElementById('cCounterparty').value || null,
                comment: document.getElementById('cComment').value.trim() || null,
            };

            const progress = document.getElementById('classifyProgress');
            progress.style.display = 'block';
            let ok = 0, fail = 0;

            for (let i = 0; i < ids.length; i++) {
                const movement = state.movements.find(m => m.sourceId === ids[i]);
                if (!movement) continue;
                progress.textContent = `Clasificando ${i + 1} de ${ids.length}…`;
                try {
                    await postJson(`${API}/api/movement-review/classify`, {
                        sourceEntityType: SOURCE_TO_ENTITY_TYPE[movement.source],
                        sourceId: movement.sourceId,
                        ...shared,
                    });
                    movement.status = 'Reviewed';
                    movement.categoryId = shared.categoryId;
                    movement.counterpartyId = shared.counterpartyId;
                    movement.movementType = shared.movementType;
                    movement.financialImpact = shared.financialImpact;
                    ok++;
                } catch {
                    fail++;
                }
            }

            progress.style.display = 'none';
            // Se limpia la selección haya habido error o no, en vez de tratar de
            // conservar solo los fallidos — más simple y consistente con cómo ya
            // se limpia selectedIds en cada loadMovements(). Si algo falló, el
            // usuario lo ve en el toast y puede volver a seleccionarlo.
            state.selectedIds.clear();
            closeClassifyModal();
            renderMovements();
            const msg = fail === 0
                ? `✓ ${ok} movimiento${ok !== 1 ? 's' : ''} clasificado${ok !== 1 ? 's' : ''}`
                : `✓ ${ok} ok · ⚠ ${fail} con error`;
            showToast('listToast', msg, fail === 0 ? 'ok' : 'err', 5000);
        }

        // ── Utils ────────────────────────────────────────────────────────────────

        async function getJson(url) {
            const r = await fetch(url);
            if (!r.ok) {
                const d = await r.json().catch(() => null);
                const msg = typeof d === 'string' ? d : (d?.detail ?? d?.title ?? `${r.status} ${r.statusText}`);
                throw new Error(msg);
            }
            return r.json();
        }

        async function postJson(url, body) {
            const opts = { method: 'POST' };
            if (body !== undefined) {
                opts.headers = { 'Content-Type': 'application/json' };
                opts.body = JSON.stringify(body);
            }
            return handleWriteResponse(await fetch(url, opts));
        }

        async function putJson(url, body) {
            const opts = {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            };
            return handleWriteResponse(await fetch(url, opts));
        }

        async function handleWriteResponse(r) {
            const d = await r.json().catch(() => null);
            if (!r.ok) {
                const msg = typeof d === 'string' ? d : (d?.detail ?? d?.title ?? `${r.status} ${r.statusText}`);
                throw new Error(msg);
            }
            return d;
        }

        function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

        function showToast(elId, msg, type, ms = 3500) {
            const el = document.getElementById(elId);
            el.innerHTML = `<span class="toast ${type}">${esc(msg)}</span>`;
            setTimeout(() => { if (el) el.innerHTML = ''; }, ms);
        }

        loadMovements();
    </script>
</body>
</html>
