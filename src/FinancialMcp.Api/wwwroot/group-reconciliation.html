<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conciliación por Grupos · FinancialSystem</title>
    <style>
        :root {
            --bg: #13171e;
            --surface: #1a1f29;
            --surface2: #222836;
            --border: #2c3444;
            --text: #dde3ed;
            --dim: #8a95a8;
            --faint: #525e72;
            --green: #52b87a;
            --green-bg: #1a3328;
            --amber: #d9933a;
            --amber-bg: #3a2a14;
            --red: #d95f5f;
            --red-bg: #3a1a1a;
            --blue: #5a9fd4;
            --mono: 'SF Mono','Cascadia Code',Consolas,monospace;
            --sans: -apple-system,system-ui,sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            color: var(--text);
            font: 14px/1.5 var(--sans);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap
        }

            .topbar h1 {
                font-size: 14px;
                font-weight: 600;
                color: var(--text);
                white-space: nowrap
            }

                .topbar h1 em {
                    color: var(--green);
                    font-style: normal
                }

        .field {
            display: flex;
            align-items: center;
            gap: 6px
        }

            .field label {
                font-size: 11px;
                color: var(--faint);
                text-transform: uppercase;
                letter-spacing: .05em;
                white-space: nowrap
            }

        input[type=date], input[type=text] {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            padding: 5px 8px;
            font: 13px var(--mono);
            width: 140px
        }

        input[type=text] {
            width: 170px
        }

        input:focus {
            outline: 2px solid var(--green);
            outline-offset: 1px
        }

        button {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            padding: 5px 12px;
            font: 13px var(--sans);
            cursor: pointer;
            white-space: nowrap;
            transition: background 100ms
        }

            button:hover:not(:disabled) {
                background: #2a3348;
                border-color: #3a4560
            }

            button:disabled {
                opacity: .35;
                cursor: not-allowed
            }

            button.primary {
                background: var(--green-bg);
                border-color: var(--green);
                color: #c0f0d0
            }

                button.primary:hover:not(:disabled) {
                    background: #1f3d2e
                }

            button.sm {
                padding: 3px 8px;
                font-size: 12px
            }

        /* ── Main area: two columns ── */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0
        }

        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid var(--border)
        }

            .col:last-child {
                border-right: none
            }

        .col-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            gap: 8px;
            flex-shrink: 0;
            flex-wrap: wrap
        }

        .col-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--dim)
        }

            .col-title span {
                font-weight: 400;
                color: var(--faint);
                margin-left: 6px
            }

        .col-actions {
            display: flex;
            gap: 6px;
            align-items: center
        }

        .filter-bar {
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0
        }

            .filter-bar input {
                width: 100%;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 4px;
                color: var(--text);
                padding: 5px 8px;
                font: 12px var(--mono)
            }

                .filter-bar input::placeholder {
                    color: var(--faint)
                }

        /* ── Table ── */
        .table-wrap {
            overflow-y: auto;
            flex: 1
        }

        table {
            width: 100%;
            border-collapse: collapse
        }

        th {
            position: sticky;
            top: 0;
            background: var(--surface);
            text-align: left;
            font: 11px var(--sans);
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--faint);
            font-weight: 500;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            z-index: 1
        }

        td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            vertical-align: middle
        }

        tr.hidden-row {
            display: none
        }

        tr.reconciled td {
            opacity: .35
        }

        tr.reconciled .cb-cell input {
            cursor: not-allowed
        }

        tr.selected td {
            background: rgba(82,184,122,.07)
        }

        tr:hover:not(.reconciled) td {
            background: var(--surface2)
        }

        td.num {
            font-family: var(--mono);
            text-align: right;
            white-space: nowrap
        }

        td.debit {
            color: var(--red)
        }

        td.credit {
            color: var(--green)
        }

        .desc {
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        .src {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--faint);
            text-transform: uppercase
        }

        .badge-done {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--green);
            margin-left: 4px
        }

        .empty {
            padding: 32px;
            text-align: center;
            color: var(--faint);
            font-size: 13px
        }

        .loading {
            padding: 24px;
            text-align: center;
            color: var(--faint);
            font: 12px var(--mono)
        }

        /* ── Balance bar (sticky bottom) ── */
        .balance-bar {
            flex-shrink: 0;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            gap: 16px;
            flex-wrap: wrap
        }

        .bal-group {
            display: flex;
            align-items: center;
            gap: 20px
        }

        .bal-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end
        }

        .bal-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--faint)
        }

        .bal-value {
            font: 600 16px var(--mono);
            white-space: nowrap
        }

        .bal-sep {
            color: var(--border);
            font-size: 20px;
            font-weight: 200
        }

        .diff-ok .bal-value {
            color: var(--green)
        }

        .diff-warn .bal-value {
            color: var(--amber)
        }

        .diff-empty .bal-value {
            color: var(--faint)
        }

        .bal-status {
            font-size: 11px;
            margin-top: 1px
        }

        .bal-actions {
            display: flex;
            gap: 8px;
            align-items: center
        }

        .toast {
            font: 12px var(--mono);
            padding: 6px 12px;
            border-radius: 4px;
            animation: fadein .15s
        }

            .toast.ok {
                background: var(--green-bg);
                color: #b0eec8;
                border: 1px solid var(--green)
            }

            .toast.err {
                background: var(--red-bg);
                color: #f0b0b0;
                border: 1px solid var(--red)
            }

        @keyframes fadein {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        /* ── Row action: Mark Reviewed ── */
        .act-cell {
            white-space: nowrap
        }

        .btn-review {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--dim);
            padding: 3px 9px;
            font: 11px var(--sans);
            cursor: pointer;
            white-space: nowrap;
            transition: all 100ms
        }

            .btn-review:hover {
                background: var(--amber-bg);
                border-color: var(--amber);
                color: #f0d4a8
            }

        tr.reconciled .btn-review {
            display: none
        }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50
        }

            .modal-overlay.open {
                display: flex
            }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 380px;
            max-width: 92vw;
            box-shadow: 0 12px 40px rgba(0,0,0,.5)
        }

        .modal-head {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border)
        }

            .modal-head h2 {
                font-size: 14px;
                font-weight: 600;
                color: var(--text)
            }

            .modal-head p {
                font-size: 12px;
                color: var(--faint);
                margin-top: 4px
            }

            .modal-head .modal-amt {
                font-family: var(--mono);
                color: var(--text)
            }

        .modal-body {
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px
        }

        .modal-field label {
            display: block;
            font-size: 11px;
            color: var(--faint);
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: 6px
        }

        .modal-field select, .modal-field textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            padding: 8px 10px;
            font: 13px var(--sans)
        }

            .modal-field select:focus, .modal-field textarea:focus {
                outline: 2px solid var(--amber);
                outline-offset: 1px
            }

        .modal-field textarea {
            resize: vertical;
            min-height: 60px;
            font-family: var(--sans)
        }

        .modal-foot {
            padding: 14px 18px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 8px
        }

        button.warn {
            background: var(--amber-bg);
            border-color: var(--amber);
            color: #f5dcb0
        }

            button.warn:hover:not(:disabled) {
                background: #4a341a
            }
    </style>
</head>
<body>

    <!-- ── Top bar ── -->
    <div class="topbar">
        <h1>Conciliación <em>N↔M</em></h1>
        <div class="field">
            <label>Desde</label>
            <input type="date" id="from">
        </div>
        <div class="field">
            <label>Hasta</label>
            <input type="date" id="to">
        </div>
        <div class="field">
            <label>Usuario</label>
            <input type="text" id="user" value="user@finapp.com">
        </div>
        <button class="primary" id="btnLoad">Cargar movimientos</button>
        <div id="topToast"></div>
    </div>

    <!-- ── Two columns ── -->
    <div class="main">

        <!-- Left: Reference (banco / tarjeta) -->
        <div class="col">
            <div class="col-head">
                <div class="col-title">Banco / Tarjeta <span id="refCount"></span></div>
                <div class="col-actions">
                    <button class="sm" id="refSelAll">Sel. todo</button>
                    <button class="sm" id="refClear">Limpiar</button>
                </div>
            </div>
            <div class="filter-bar">
                <input type="text" id="refFilter" placeholder="Filtrar por descripción o monto…">
            </div>
            <div class="table-wrap">
                <table id="refTable">
                    <thead>
                        <tr>
                            <th style="width:32px"></th>
                            <th>Fecha</th>
                            <th>Descripción</th>
                            <th>Monto</th>
                            <th>Origen</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="refBody">
                        <tr><td colspan="6" class="empty">Cargá un período para comenzar.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Right: Candidate (manual / Excel) -->
        <div class="col">
            <div class="col-head">
                <div class="col-title">Excel / Manual <span id="candCount"></span></div>
                <div class="col-actions">
                    <button class="sm" id="candSelAll">Sel. todo</button>
                    <button class="sm" id="candClear">Limpiar</button>
                </div>
            </div>
            <div class="filter-bar">
                <input type="text" id="candFilter" placeholder="Filtrar por descripción o monto…">
            </div>
            <div class="table-wrap">
                <table id="candTable">
                    <thead>
                        <tr>
                            <th style="width:32px"></th>
                            <th>Fecha</th>
                            <th>Descripción</th>
                            <th>Monto</th>
                            <th>Origen</th>
                        </tr>
                    </thead>
                    <tbody id="candBody">
                        <tr><td colspan="5" class="empty">Cargá un período para comenzar.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- ── Balance bar ── -->
    <div class="balance-bar">
        <div class="bal-group">
            <div class="bal-item">
                <span class="bal-label">Banco seleccionado</span>
                <span class="bal-value" id="balRef">$0,00</span>
                <span class="bal-status" id="balRefN" style="color:var(--faint)">0 ítems</span>
            </div>
            <div class="bal-sep">↔</div>
            <div class="bal-item">
                <span class="bal-label">Excel seleccionado</span>
                <span class="bal-value" id="balCand">$0,00</span>
                <span class="bal-status" id="balCandN" style="color:var(--faint)">0 ítems</span>
            </div>
            <div class="bal-sep" style="opacity:.3">|</div>
            <div class="bal-item diff-empty" id="diffBox">
                <span class="bal-label">Diferencia</span>
                <span class="bal-value" id="balDiff">—</span>
                <span class="bal-status" id="balDiffMsg"></span>
            </div>
        </div>
        <div class="bal-actions">
            <div id="balToast"></div>
            <button class="primary" id="btnConfirm" disabled>Confirmar grupo</button>
        </div>
    </div>

    <!-- ── Modal: Mark Reviewed ── -->
    <div class="modal-overlay" id="reviewOverlay">
        <div class="modal">
            <div class="modal-head">
                <h2>Marcar como revisado</h2>
                <p id="reviewSubtitle"></p>
            </div>
            <div class="modal-body">
                <div class="modal-field">
                    <label for="reviewReason">Motivo</label>
                    <select id="reviewReason">
                        <option value="1">Transferencia personal</option>
                        <option value="2">Regalo</option>
                        <option value="3">Movimiento interno</option>
                        <option value="4">Comisión bancaria</option>
                        <option value="5">Interés</option>
                        <option value="99">Otro</option>
                    </select>
                </div>
                <div class="modal-field">
                    <label for="reviewNotes">Notas (opcional)</label>
                    <textarea id="reviewNotes" placeholder="Detalle adicional…"></textarea>
                </div>
                <div id="reviewModalToast"></div>
            </div>
            <div class="modal-foot">
                <button id="btnReviewCancel">Cancelar</button>
                <button class="warn" id="btnReviewSave">Guardar revisión</button>
            </div>
        </div>
    </div>

    <script>
        const API = '';
        const TOLERANCE = 50;        // debe coincidir con ReconciliationOptions.AmountAbsoluteTolerance
        const SEP = (n) => new Intl.NumberFormat('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
        const fmtDate = (iso) => { const d = new Date(iso); return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getFullYear()).slice(2)}`; };

        // ── State ─────────────────────────────────────────────────────────────────────
        let refs = [];   // UnmatchedMovementDto[]
        let cands = [];
        const selRef = new Set();  // selected Guids
        const selCand = new Set();

        // ── Init ──────────────────────────────────────────────────────────────────────
        (function initPeriod() {
            const now = new Date();
            const y = now.getFullYear(), m = now.getMonth();
            document.getElementById('from').value = `${y}-${String(m + 1).padStart(2, '0')}-01`;
            const last = new Date(y, m + 1, 0);
            document.getElementById('to').value = `${y}-${String(m + 1).padStart(2, '0')}-${String(last.getDate()).padStart(2, '0')}`;
        })();

        // ── Load ──────────────────────────────────────────────────────────────────────
        document.getElementById('btnLoad').addEventListener('click', load);

        async function load() {
            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;
            if (!from || !to) return;

            setLoading();
            try {
                const data = await getJson(`${API}/api/reconciliation/unmatched-movements?from=${from}&to=${to}`);
                refs = data.references ?? [];
                cands = data.candidates ?? [];
                selRef.clear();
                selCand.clear();
                renderTable('ref', refs, selRef);
                renderTable('cand', cands, selCand);
                updateBalance();
            } catch (e) {
                showToast('topToast', `Error: ${e.message}`, 'err');
            }
        }

        function setLoading() {
            document.getElementById('refBody').innerHTML = '<tr><td colspan="5" class="loading">Cargando…</td></tr>';
            document.getElementById('candBody').innerHTML = '<tr><td colspan="5" class="loading">Cargando…</td></tr>';
        }

        // ── Render table ──────────────────────────────────────────────────────────────
        function renderTable(side, items, selSet) {
            const tbody = document.getElementById(side + 'Body');
            const count = document.getElementById(side === 'ref' ? 'refCount' : 'candCount');
            count.textContent = `(${items.length})`;

            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty">Sin movimientos en este período.</td></tr>';
                return;
            }

            tbody.innerHTML = items.map((m, i) => {
                const debit = m.amount < 0;
                const amtCls = debit ? 'num debit' : 'num credit';
                const doneCls = m.alreadyReconciled ? ' reconciled' : '';
                const srcShort = m.source.replace('Manual', '').replace('Dynamic', 'Dyn').replace('Fixed', 'Fix').replace('Debit', 'Déb').replace('Card', 'TC');
                const actionCell = side === 'ref'
                    ? `<td class="act-cell">${m.alreadyReconciled ? '' : `<button class="btn-review" data-id="${m.id}" data-source="${m.source}" data-amt="${Math.abs(m.amount)}" data-desc="${esc(m.description)}">Marcar revisado</button>`}</td>`
                    : '';
                return `<tr data-id="${m.id}" data-side="${side}" data-amt="${Math.abs(m.amount)}" data-src="${m.source}" class="row${doneCls}">
          <td class="cb-cell"><input type="checkbox" data-id="${m.id}" data-side="${side}"${m.alreadyReconciled ? ' disabled title="Ya conciliado"' : ''}></td>
          <td>${fmtDate(m.date)}</td>
          <td class="desc" title="${esc(m.description)}">${esc(m.description)}${m.alreadyReconciled ? '<span class="badge-done">✓</span>' : ''}</td>
          <td class="${amtCls}">$${SEP(Math.abs(m.amount))}</td>
          <td class="src">${srcShort}</td>
          ${actionCell}
        </tr>`;
            }).join('');

            applyFilter(side);
        }

        // ── Filter ────────────────────────────────────────────────────────────────────
        document.getElementById('refFilter').addEventListener('input', () => applyFilter('ref'));
        document.getElementById('candFilter').addEventListener('input', () => applyFilter('cand'));

        function applyFilter(side) {
            const val = document.getElementById(side + 'Filter').value.toLowerCase().trim();
            document.querySelectorAll(`#${side}Body tr.row`).forEach(tr => {
                if (!val) { tr.classList.remove('hidden-row'); return; }
                const desc = tr.querySelector('.desc')?.textContent.toLowerCase() ?? '';
                const amt = tr.dataset.amt ?? '';
                tr.classList.toggle('hidden-row', !desc.includes(val) && !amt.includes(val));
            });
        }

        // ── Checkbox events ───────────────────────────────────────────────────────────
        document.addEventListener('change', e => {
            const cb = e.target;
            if (cb.type !== 'checkbox' || !cb.dataset.side) return;
            const id = cb.dataset.id;
            const side = cb.dataset.side;
            const set = side === 'ref' ? selRef : selCand;

            if (cb.checked) set.add(id); else set.delete(id);

            // Highlight row
            cb.closest('tr').classList.toggle('selected', cb.checked);
            updateBalance();
        });

        // Row click toggles checkbox (easier click target)
        document.addEventListener('click', e => {
            const tr = e.target.closest('tr.row');
            if (!tr || e.target.type === 'checkbox' || e.target.closest('.btn-review')) return;
            const cb = tr.querySelector('input[type=checkbox]');
            if (!cb || cb.disabled) return;
            cb.checked = !cb.checked;
            cb.dispatchEvent(new Event('change', { bubbles: true }));
        });

        // ── Mark Reviewed modal ───────────────────────────────────────────────────────
        let reviewTarget = null; // { id, source }

        document.addEventListener('click', e => {
            const btn = e.target.closest('.btn-review');
            if (!btn) return;
            reviewTarget = { id: btn.dataset.id, source: btn.dataset.source };
            document.getElementById('reviewSubtitle').innerHTML =
                `${esc(btn.dataset.desc)} · <span class="modal-amt">$${SEP(parseFloat(btn.dataset.amt))}</span>`;
            document.getElementById('reviewReason').value = '1';
            document.getElementById('reviewNotes').value = '';
            document.getElementById('reviewModalToast').innerHTML = '';
            document.getElementById('reviewOverlay').classList.add('open');
        });

        function closeReviewModal() {
            document.getElementById('reviewOverlay').classList.remove('open');
            reviewTarget = null;
        }

        document.getElementById('btnReviewCancel').addEventListener('click', closeReviewModal);
        document.getElementById('reviewOverlay').addEventListener('click', e => {
            if (e.target.id === 'reviewOverlay') closeReviewModal();
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && document.getElementById('reviewOverlay').classList.contains('open'))
                closeReviewModal();
        });

        // MovementSource (motor de matching) → SourceEntityType (persistencia de ReconciledExpenseItem)
        // El backend NO tiene JsonStringEnumConverter configurado (Program.cs confirmado sin AddJsonOptions
        // de enums), así que System.Text.Json espera el valor numérico subyacente del enum, no el nombre.
        // Mapeo según FinancialSystem.Domain.Enums.SourceEntityType:
        //   Transaction = 0, ManualExpense = 1, BankStatement = 2, AccountMovement = 3
        const SOURCE_ENTITY_TYPE = {
            CreditCard: 0, // Transaction
            BankDebit: 2, // BankStatement
            ManualDynamic: 1, // ManualExpense
            ManualFixed: 1, // ManualExpense
        };
        function toSourceEntityType(movementSource) {
            return SOURCE_ENTITY_TYPE[movementSource] ?? 1; // default ManualExpense si llega algo inesperado
        }

        document.getElementById('btnReviewSave').addEventListener('click', saveReview);

        async function saveReview() {
            if (!reviewTarget) return;

            const reason = parseInt(document.getElementById('reviewReason').value, 10);
            const notes = document.getElementById('reviewNotes').value.trim();

            const body = {
                sourceEntityType: toSourceEntityType(reviewTarget.source),
                sourceId: reviewTarget.id,
                reason,
                notes: notes || null,
            };

            const btn = document.getElementById('btnReviewSave');
            btn.disabled = true;
            btn.textContent = '…';

            try {
                const res = await postJson(`${API}/api/reconciliation/review`, body);

                if (!res.success) {
                    showToast('reviewModalToast', `Error: ${res.error ?? 'Desconocido'}`, 'err');
                    return;
                }

                const id = reviewTarget.id;
                markReconciled('ref', id);
                const m = refs.find(r => r.id === id);
                if (m) m.alreadyReconciled = true;
                selRef.delete(id);
                updateBalance();

                closeReviewModal();
                showToast('topToast', '✓ Movimiento marcado como revisado', 'ok');

            } catch (e) {
                showToast('reviewModalToast', `Error: ${e.message}`, 'err');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Guardar revisión';
            }
        }

        // ── Select all / clear ────────────────────────────────────────────────────────
        document.getElementById('refSelAll').addEventListener('click', () => toggleAll('ref'));
        document.getElementById('candSelAll').addEventListener('click', () => toggleAll('cand'));
        document.getElementById('refClear').addEventListener('click', () => clearSel('ref'));
        document.getElementById('candClear').addEventListener('click', () => clearSel('cand'));

        function toggleAll(side) {
            const set = side === 'ref' ? selRef : selCand;
            const boxes = [...document.querySelectorAll(`#${side}Body input[type=checkbox]:not(:disabled)`)];
            const visibleBoxes = boxes.filter(cb => !cb.closest('tr').classList.contains('hidden-row'));
            const allChecked = visibleBoxes.every(cb => cb.checked);
            visibleBoxes.forEach(cb => {
                cb.checked = !allChecked;
                const id = cb.dataset.id;
                if (!allChecked) set.add(id); else set.delete(id);
                cb.closest('tr').classList.toggle('selected', !allChecked);
            });
            updateBalance();
        }

        function clearSel(side) {
            const set = side === 'ref' ? selRef : selCand;
            set.clear();
            document.querySelectorAll(`#${side}Body input[type=checkbox]`).forEach(cb => {
                cb.checked = false;
                cb.closest('tr').classList.remove('selected');
            });
            updateBalance();
        }

        // ── Balance ───────────────────────────────────────────────────────────────────
        function updateBalance() {
            const refTotal = sumSelected('ref', selRef);
            const candTotal = sumSelected('cand', selCand);
            const nRef = selRef.size;
            const nCand = selCand.size;
            const diff = Math.abs(refTotal - candTotal);

            document.getElementById('balRef').textContent = `$${SEP(refTotal)}`;
            document.getElementById('balCand').textContent = `$${SEP(candTotal)}`;
            document.getElementById('balRefN').textContent = `${nRef} ítem${nRef !== 1 ? 's' : ''}`;
            document.getElementById('balCandN').textContent = `${nCand} ítem${nCand !== 1 ? 's' : ''}`;

            const diffBox = document.getElementById('diffBox');
            const diffEl = document.getElementById('balDiff');
            const msgEl = document.getElementById('balDiffMsg');

            if (nRef === 0 && nCand === 0) {
                diffBox.className = 'bal-item diff-empty';
                diffEl.textContent = '—';
                msgEl.textContent = '';
            } else if (nRef === 0 || nCand === 0) {
                diffBox.className = 'bal-item diff-empty';
                diffEl.textContent = nRef === 0 ? 'Sin banco' : 'Sin Excel';
                msgEl.textContent = 'Seleccioná ambos lados';
            } else if (diff <= TOLERANCE) {
                diffBox.className = 'bal-item diff-ok';
                diffEl.textContent = `$${SEP(diff)}`;
                msgEl.textContent = diff === 0 ? '✓ Balanceado' : '✓ Dentro de tolerancia';
            } else {
                diffBox.className = 'bal-item diff-warn';
                diffEl.textContent = `$${SEP(diff)}`;
                msgEl.textContent = '⚠ Diferencia fuera de tolerancia';
            }

            const canConfirm = nRef > 0 && nCand > 0;
            document.getElementById('btnConfirm').disabled = !canConfirm;
        }

        function sumSelected(side, selSet) {
            let total = 0;
            const source = side === 'ref' ? refs : cands;
            selSet.forEach(id => {
                const m = source.find(x => x.id === id);
                if (m) total += Math.abs(m.amount);
            });
            return total;
        }

        // ── Confirm group ─────────────────────────────────────────────────────────────
        document.getElementById('btnConfirm').addEventListener('click', confirmGroup);

        async function confirmGroup() {
            const user = document.getElementById('user').value.trim();
            if (!user) { showToast('balToast', 'Indicá el usuario', 'err'); return; }

            const refItems = [...selRef].map(id => ({ id, source: refs.find(r => r.id === id)?.source }));
            const candItems = [...selCand].map(id => ({ id, source: cands.find(c => c.id === id)?.source }));

            const body = {
                periodStart: document.getElementById('from').value,
                periodEnd: document.getElementById('to').value,
                confirmedBy: user,
                referenceItems: refItems,
                candidateItems: candItems,
            };

            const btn = document.getElementById('btnConfirm');
            btn.disabled = true;
            btn.textContent = '…';

            try {
                const res = await postJson(`${API}/api/reconciliation/confirm-group`, body);

                if (!res.success) {
                    showToast('balToast', `Error: ${res.error ?? 'Desconocido'}`, 'err');
                    return;
                }

                // Mark rows as reconciled in-place (no full reload)
                [...selRef].forEach(id => markReconciled('ref', id));
                [...selCand].forEach(id => markReconciled('cand', id));

                // Update in-memory state
                [...selRef].forEach(id => { const m = refs.find(r => r.id === id); if (m) m.alreadyReconciled = true; });
                [...selCand].forEach(id => { const m = cands.find(c => c.id === id); if (m) m.alreadyReconciled = true; });

                selRef.clear();
                selCand.clear();
                updateBalance();

                const mismatch = res.hasAmountMismatch
                    ? ` ⚠ Δ $${SEP(res.amountDelta)}`
                    : '';
                showToast('balToast',
                    `✓ Grupo conciliado · ${refItems.length}↔${candItems.length} · $${SEP(res.referenceTotal)}${mismatch}`,
                    'ok', 4000);

            } catch (e) {
                showToast('balToast', `Error: ${e.message}`, 'err');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Confirmar grupo';
                updateBalance();
            }
        }

        function markReconciled(side, id) {
            const tr = document.querySelector(`#${side}Body tr[data-id="${id}"]`);
            if (!tr) return;
            tr.classList.add('reconciled');
            tr.classList.remove('selected');
            const cb = tr.querySelector('input[type=checkbox]');
            if (cb) { cb.checked = false; cb.disabled = true; }
            const desc = tr.querySelector('.desc');
            if (desc && !desc.querySelector('.badge-done'))
                desc.insertAdjacentHTML('beforeend', '<span class="badge-done">✓</span>');
        }

        // ── Utils ─────────────────────────────────────────────────────────────────────
        async function getJson(url) {
            const r = await fetch(url);
            if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
            return r.json();
        }
        async function postJson(url, body) {
            const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            const d = await r.json().catch(() => null);
            if (!r.ok) throw new Error(d?.title ?? `${r.status} ${r.statusText}`);
            return d;
        }
        function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])) }
        function showToast(elId, msg, type, ms = 3500) {
            const el = document.getElementById(elId);
            el.innerHTML = `<span class="toast ${type}">${msg}</span>`;
            setTimeout(() => { if (el) el.innerHTML = ''; }, ms);
        }
    </script>
</body>
</html>
